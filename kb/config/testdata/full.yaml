# Every field set. Used as a golden round-trip test and as
# docs/configuration.md's referenced example.

http:
  address: 127.0.0.1:8080
  read_header_timeout: 5s
  shutdown_timeout: 5s

storage:
  blob:
    kind: local
    root: ./.temp/fixtures
  cache:
    dir: ./.temp/cache
    max_bytes: 0
    entry_ttl: 0s
    evict_interval: 30s

format:
  kind: duckdb
  duckdb:
    memory_limit: 128MB
    extension_dir: ./extensions
    offline: false

embedder:
  provider: ollama
  ollama:
    url: http://localhost:11434
    model: all-minilm
  local:
    dim: 384

graph:
  enabled: false
  url: http://localhost:11434
  model: llama3
  parallelism: 2

mongo:
  uri: ${MINNOW_TEST_MONGO_URI}
  database: minnow
  collections:
    manifests: manifests
    events: kb_events
    inbox: kb_event_inbox
    media: media

scheduler:
  enabled: true
  tick_interval: 1m
  disabled_jobs: []

workers:
  defaults:
    max_attempts: 5
    poll_interval: 500ms
    visibility_timeout: 5m
  document_upsert:
    concurrency: 4
  document_chunked:
    concurrency: 4
  document_publish:
    concurrency: 2
    visibility_timeout: 10m
  media_upload:
    concurrency: 2

media:
  enabled: true
  max_bytes: 10485760
  content_type_allowlist:
    - application/pdf
    - image/png
    - image/jpeg
  pending_ttl: 24h
  tombstone_grace: 1h
  upload_completion_ttl: 15m

sharding:
  shard_trigger_bytes: 67108864
  shard_trigger_vector_rows: 150000
  target_shard_bytes: 33554432
  max_vector_rows_per_shard: 75000
  query_shard_fanout: 4
  query_shard_fanout_adaptive_max: 6
  query_shard_parallelism: 4
  query_shard_local_topk_multiplier: 2
  small_kb_max_shards: 2
  compaction_enabled: true
  compaction_min_shard_count: 8
  compaction_tombstone_ratio: 0.20
