# OpenAI-backed local developer config. Intended for globally installed MCP use.
# Set OPENAI_API_KEY in your shell or MCP client environment before starting.

storage:
  blob:
    root: ./.temp/dev-openai/blobs
  cache:
    dir: ./.temp/dev-openai/cache

format:
  duckdb:
    extension_dir: ./extensions
    offline: false

embedder:
  provider: openai_compatible
  openai_compatible:
    base_url: https://api.openai.com/v1
    model: text-embedding-3-small
    token: ${OPENAI_API_KEY}
    dimensions: 0

code_index:
  include:
    - "**/*.go"
    - "**/*.js"
    - "**/*.jsx"
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.py"
    - "**/*.rs"
    - "**/*.md"
    - "**/*.yaml"
    - "**/*.yml"
    - "**/*.json"
    - "**/Dockerfile"
  max_file_bytes: 1048576
  chunk_size: 1200
  chunk_overlap: 120
  include_untracked: false
  embed_batch_size: 32
  max_batch_bytes: 262144
  throttle: 100ms
  max_heap_bytes: 1073741824
  max_rss_bytes: 1073741824
  large_repo_files: 1000
  require_confirm: false

mcp:
  enabled: true
  transports: [http, stdio]
  http_path: /mcp
  allow_indexing: true
  allow_sync_indexing: true
