# Full minnow deployment example. Every field is set explicitly so the file
# can be diffed against docs/configuration.md and used as a starting point
# for production configs.
#
# Secrets (Mongo URI) are referenced via the dollar-sign VAR syntax.
# Set them in the process environment, not inline.
#
# Run: MINNOW_MONGO_URI=mongodb://localhost:27017 \
#      MINNOW_CONFIG=./examples/minnow.yaml ./minnow

http:
  address: 127.0.0.1:8080
  read_header_timeout: 5s
  shutdown_timeout: 5s

storage:
  blob:
    kind: local
    root: ./.temp/fixtures
  cache:
    dir: ./.temp/cache
    max_bytes: 0          # 0 = unbounded
    entry_ttl: 0s         # 0 = no TTL
    evict_interval: 30s

format:
  kind: duckdb
  duckdb:
    memory_limit: 128MB
    extension_dir: ./extensions
    offline: false

# Default embedder is `local` (deterministic, zero-dependency). To use
# Ollama instead, set `provider: ollama` and uncomment the `ollama` block
# below. When `provider: local` the `local` block is required.
embedder:
  provider: local
  local:
    dim: 384
  # ollama:
  #   url: http://localhost:11434
  #   model: all-minilm

graph:
  enabled: false
  url: http://localhost:11434
  model: llama3
  parallelism: 2

mongo:
  uri: ${MINNOW_MONGO_URI}
  database: minnow
  collections:
    manifests: manifests
    events: kb_events
    inbox: kb_event_inbox
    media: media

scheduler:
  enabled: true
  tick_interval: 1m
  disabled_jobs: []

workers:
  defaults:
    max_attempts: 5
    poll_interval: 500ms
    visibility_timeout: 5m
  document_upsert:
    concurrency: 4
  document_chunked:
    concurrency: 4
  document_publish:
    concurrency: 2
  media_upload:
    concurrency: 2

media:
  enabled: true
  max_bytes: 10485760     # 10 MiB
  content_type_allowlist: []   # empty = accept all
  pending_ttl: 24h
  tombstone_grace: 1h
  upload_completion_ttl: 15m

sharding:
  shard_trigger_bytes: 67108864          # 64 MiB
  shard_trigger_vector_rows: 150000
  target_shard_bytes: 33554432           # 32 MiB
  max_vector_rows_per_shard: 75000
  query_shard_fanout: 4                  # <= 64
  query_shard_fanout_adaptive_max: 6     # >= query_shard_fanout, <= 64
  query_shard_parallelism: 4
  query_shard_local_topk_multiplier: 2   # <= 16
  small_kb_max_shards: 2
  compaction_enabled: true
  compaction_min_shard_count: 8
  compaction_tombstone_ratio: 0.20       # (0, 1]
